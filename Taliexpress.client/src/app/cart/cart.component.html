<div *ngIf="cartDisplayProducts; else loading">
  <div class="page-content">
    <div *ngFor="let product of cartDisplayProducts; let i = index">
      <div>
        <input type="checkbox" (change)="addOrRemoveFromPurchase(product.id)" [(ngModel)]="product.isChecked" />
      </div>
      <div class="productDataDiv">
        <div class="leftProductDiv">
          <h2>Name: {{ product.name }}</h2>
          <h6>Description: {{ product.description }}</h6>
          <p>Price: {{ product.price }}</p>
          <p>Amount in cart: {{ product.productsToBuy }}</p>
          <!--<div>
            <button type="submit" (click)="increaseAmount(product)">+</button>
            <input type="number" min="1" max="{{ product.amountInInvenotry }}" placeholder="Quantity" [value]="product.productsToBuy" readonly />
            <button type="submit" (click)="decreaseAmount(product)">-</button>
            <button (click)="addToCart(product.id, product.productsToBuy)">Add to Cart</button>
          </div>-->
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #loading>
  <p>Loading...</p>
</ng-template>
